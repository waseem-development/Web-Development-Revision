<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Title & Description ── -->
    <title>ThePublicBlog — Write, Share & Discover</title>
    <meta name="description" content="A place for everyone to read, write, and share ideas with the world. Join our growing community of writers and readers." />

    <!-- ── Favicons ── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── PWA / Web Manifest ── -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Theme color (matches amber accent) ── -->
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- ── Open Graph (social sharing) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ThePublicBlog — Write, Share & Discover" />
    <meta property="og:description" content="A place for everyone to read, write, and share ideas with the world." />
    <meta property="og:image" content="/web-app-manifest-512x512.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ThePublicBlog — Write, Share & Discover" />
    <meta name="twitter:description" content="A place for everyone to read, write, and share ideas with the world." />
    <meta name="twitter:image" content="/web-app-manifest-512x512.png" />

    <!-- ── No flash on theme load (must be inline, before body) ── -->
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (saved === "dark" || (!saved && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
